name: Deploy Pupilens + Kero Ótica Landing Page

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Upload Pupilens + Kero Ótica to DreamHost
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: FTP Deploy Pupilens + Kero Ótica
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: /home/USUARIO_FTP/DOMINIO_PUPILENS_KERO/pupilens_and_kero_otica_LP/
          local-dir: ./
          protocol: ftps
          port: 21
